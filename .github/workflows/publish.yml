name: Publish to PyPI

on:
  release:
    types: [published]
  # Manual re-publish path: a release run uses the workflow file at the tag,
  # so a workflow fix can never rescue an already-failed release run.
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/zurich-opendata-mcp/
    permissions:
      id-token: write   # Required for Trusted Publisher (OIDC)

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # Deliberately tag-pinned, NOT SHA-pinned: this is a Docker action
        # whose ghcr.io image is tagged by ref name only — pinning the SHA
        # makes the runner pull ghcr.io/...:<sha>, which does not exist
        # ("manifest unknown", broke the v0.5.0 release run).
        uses: pypa/gh-action-pypi-publish@v1.14.1
