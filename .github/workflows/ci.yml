name: CI

# Runs on every pull request. No deploy, no push (publishing lives in
# publish.yml and is release-triggered only). Branch protection on main
# requires this workflow to pass — see docs/SECURITY-BASELINE.md.
on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

  audit:
    runs-on: ubuntu-latest
    # Alarm, don't block: a fresh advisory in a transitive dependency should
    # show up red here without blocking every unrelated PR (the `check`
    # matrix stays the required gate). Tighten to blocking once a clean
    # baseline has held for a while.
    continue-on-error: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: pip-audit
        run: uv run --with pip-audit pip-audit
